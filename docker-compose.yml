version: '3.8'
services:
  postgres:
    image: postgres
    container_name: postgres-container
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: event-booking
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: giabaodongthanh@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 15092004
    ports:
      - "8081:80"
    depends_on:
      - postgres
volumes:
  pgdata: